    <!-- 하단 고정 UI: 맨 위로 + 최종 수정일 -->
    <div class="fixed-bottom-ui">
        <ul>
            <li>
                <button id="topBtn" type="button">맨 위로</button>
            </li>
            <li>
                <div class="update-date">최종 수정일: 2026. 06. 23</div>
            </li>
        </ul>
    </div>

    <script>
        (function () {
            "use strict";

            /* ---- 테마 토글 ---- */
            var root = document.documentElement;
            var themeBtn = document.getElementById('themeToggle');
            if (themeBtn) {
                themeBtn.addEventListener('click', function () {
                    var next = root.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
                    root.setAttribute('data-theme', next);
                    try { localStorage.setItem('theme', next); } catch (e) { }
                });
            }

            /* ---- 모바일 드로어 ---- */
            var drawerBtn = document.getElementById('drawerToggle');
            var scrim = document.getElementById('drawerScrim');
            function setDrawer(open) {
                document.body.classList.toggle('drawer-open', open);
                if (scrim) scrim.hidden = !open;
                if (drawerBtn) drawerBtn.setAttribute('aria-expanded', open ? 'true' : 'false');
            }
            if (drawerBtn) drawerBtn.addEventListener('click', function () {
                setDrawer(!document.body.classList.contains('drawer-open'));
            });
            if (scrim) scrim.addEventListener('click', function () { setDrawer(false); });
            // 드로어 안의 섹션 링크 클릭 시 닫기
            document.querySelectorAll('.rail-left a').forEach(function (a) {
                a.addEventListener('click', function () { setDrawer(false); });
            });

            /* ---- 진행률 바 (스파인 하단 채움) ---- */
            var progressBar = document.getElementById('progressBar');
            function updateProgress() {
                if (!progressBar) return;
                var winScroll = document.body.scrollTop || document.documentElement.scrollTop;
                var height = document.documentElement.scrollHeight - document.documentElement.clientHeight;
                progressBar.style.width = (height > 0 ? (winScroll / height) * 100 : 0) + '%';
            }

            /* ---- 우측 페이지 목차 h2 스크롤스파이 + breadcrumb ---- */
            var headings = Array.prototype.slice.call(document.querySelectorAll('main.main-content .sub-title'));
            var tocLinks = Array.prototype.slice.call(document.querySelectorAll('.page-toc-link'));
            var crumbCurrent = document.querySelector('.breadcrumb .crumb-current');
            var crumbSep = document.querySelector('.breadcrumb .crumb-sep');
            // 헤딩은 scroll-margin-top(=topbar 56 + 8 = 64) 위치에 안착하므로, 임계값을
            // 그보다 약간 크게 잡아야 막 클릭해 도착한 헤딩이 곧바로 active로 판정된다(off-by-one 방지).
            var topOffset = 96; // topbar + scroll-margin + 여유
            var activeId = null;

            function syncSpy() {
                if (!headings.length) return;
                var current = null;
                for (var i = 0; i < headings.length; i++) {
                    if (headings[i].getBoundingClientRect().top <= topOffset) {
                        current = headings[i];
                    }
                }
                var id = current ? current.getAttribute('id') : null;
                if (id === activeId) return;
                activeId = id;
                tocLinks.forEach(function (link) {
                    link.classList.toggle('active', !!id && link.getAttribute('href') === '#' + id);
                });
                if (crumbCurrent) {
                    crumbCurrent.textContent = current ? current.textContent.trim() : '';
                    if (crumbSep) crumbSep.style.visibility = current ? 'visible' : 'hidden';
                }
            }

            var ticking = false;
            function onScroll() {
                if (ticking) return;
                ticking = true;
                window.requestAnimationFrame(function () {
                    updateProgress();
                    syncSpy();
                    ticking = false;
                });
            }
            window.addEventListener('scroll', onScroll, { passive: true });
            window.addEventListener('resize', onScroll, { passive: true });
            updateProgress();
            syncSpy();

            /* ---- 이미지 로드 인지 앵커 스크롤 (스크린샷 시프트 방지) ---- */
            function scrollToTarget(el) {
                el.scrollIntoView({ behavior: 'smooth', block: 'start' });
                history.replaceState(null, '', ' ');
            }
            document.querySelectorAll('a[href^="#"]').forEach(function (link) {
                link.addEventListener('click', function (e) {
                    var id = this.getAttribute('href').substring(1);
                    if (!id) return;
                    var target = document.getElementById(decodeURIComponent(id));
                    if (!target) return;
                    e.preventDefault();
                    var imgs = target.querySelectorAll('.lazy-scroll-img');
                    if (!imgs.length) { scrollToTarget(target); return; }
                    var loaded = 0;
                    function done() { loaded++; if (loaded === imgs.length) scrollToTarget(target); }
                    imgs.forEach(function (img) {
                        if (img.complete) { done(); }
                        else { img.addEventListener('load', done); img.addEventListener('error', done); }
                    });
                });
            });

            /* ---- ⌘K 검색 ---- */
            var dialog = document.getElementById('searchDialog');
            var input = document.getElementById('searchInput');
            var resultsEl = document.getElementById('searchResults');
            var emptyEl = document.getElementById('searchEmpty');
            var chunks = null, activeIdx = -1;

            function loadIndex() {
                if (chunks) return Promise.resolve();
                return fetch('search-index.json').then(function (r) { return r.json(); })
                    .then(function (data) { chunks = data; })
                    .catch(function () { chunks = []; });
            }
            function openSearch() {
                if (!dialog || typeof dialog.showModal !== 'function') return;
                loadIndex().then(function () {
                    if (!dialog.open) dialog.showModal();
                    input.value = '';
                    render('');
                    setTimeout(function () { input.focus(); }, 0);
                });
            }
            function hrefOf(c) { return c.anchor ? c.file + '#' + c.anchor : c.file; }
            function snippet(text, q) {
                var i = (text || '').toLowerCase().indexOf(q);
                if (i < 0) return null;
                var s = Math.max(0, i - 30), e = Math.min(text.length, i + q.length + 40);
                return {
                    pre: (s > 0 ? '…' : '') + text.slice(s, i),
                    hit: text.slice(i, i + q.length),
                    post: text.slice(i + q.length, e) + (e < text.length ? '…' : '')
                };
            }
            function render(q) {
                q = q.trim().toLowerCase();
                resultsEl.innerHTML = '';
                var items;
                if (!q) {
                    items = (chunks || []).slice(0, 10).map(function (c) { return { c: c, snip: null }; });
                } else {
                    var scored = [];
                    (chunks || []).forEach(function (c) {
                        var inHead = (c.heading || '').toLowerCase().indexOf(q) !== -1;
                        var inPage = (c.page || '').toLowerCase().indexOf(q) !== -1;
                        var snip = snippet(c.text, q);
                        if (inHead || inPage || snip) {
                            scored.push({ c: c, rank: inHead ? 0 : (inPage ? 1 : 2), snip: snip });
                        }
                    });
                    scored.sort(function (a, b) { return a.rank - b.rank; });
                    var seen = {}; items = [];
                    scored.forEach(function (it) {
                        var h = hrefOf(it.c);
                        if (!seen[h]) { seen[h] = 1; items.push(it); }
                    });
                    items = items.slice(0, 30);
                }
                activeIdx = items.length ? 0 : -1;
                items.forEach(function (it, i) {
                    var li = document.createElement('li');
                    var a = document.createElement('a');
                    a.href = hrefOf(it.c);
                    if (i === 0) a.classList.add('active');
                    var t = document.createElement('span'); t.className = 'res-title';
                    t.textContent = it.c.heading || it.c.page;
                    var cx = document.createElement('span'); cx.className = 'res-ctx';
                    cx.textContent = it.c.page;
                    a.appendChild(t); a.appendChild(cx);
                    if (it.snip) {
                        var sn = document.createElement('span'); sn.className = 'res-snip';
                        sn.appendChild(document.createTextNode(it.snip.pre));
                        var mk = document.createElement('mark'); mk.textContent = it.snip.hit;
                        sn.appendChild(mk);
                        sn.appendChild(document.createTextNode(it.snip.post));
                        a.appendChild(sn);
                    }
                    li.appendChild(a);
                    resultsEl.appendChild(li);
                });
                emptyEl.hidden = !(q && !items.length);
            }
            function move(d) {
                var links = resultsEl.querySelectorAll('a');
                if (!links.length) return;
                links[activeIdx] && links[activeIdx].classList.remove('active');
                activeIdx = (activeIdx + d + links.length) % links.length;
                links[activeIdx].classList.add('active');
                links[activeIdx].scrollIntoView({ block: 'nearest' });
            }
            if (dialog) {
                document.querySelectorAll('[data-search-open]').forEach(function (b) {
                    b.addEventListener('click', openSearch);
                });
                document.addEventListener('keydown', function (e) {
                    if ((e.metaKey || e.ctrlKey) && (e.key === 'k' || e.key === 'K')) { e.preventDefault(); openSearch(); }
                });
                input.addEventListener('input', function () { render(input.value); });
                input.addEventListener('keydown', function (e) {
                    if (e.key === 'ArrowDown') { e.preventDefault(); move(1); }
                    else if (e.key === 'ArrowUp') { e.preventDefault(); move(-1); }
                    else if (e.key === 'Enter') {
                        var a = resultsEl.querySelectorAll('a')[activeIdx];
                        if (a) { e.preventDefault(); window.location.href = a.getAttribute('href'); }
                    }
                });
            }

            /* ---- 맨 위로 ---- */
            var topBtn = document.getElementById('topBtn');
            if (topBtn) topBtn.addEventListener('click', function () { window.scrollTo({ top: 0, behavior: 'smooth' }); });
        })();
    </script>
